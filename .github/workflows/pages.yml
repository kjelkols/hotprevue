name: Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (f.eks. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject version and download URL into HTML
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          VER="${TAG#v}"
          URL="https://github.com/kjelkols/hotprevue/releases/download/${TAG}/Hotprevue-${VER}.zip"
          sed -i "s|PLACEHOLDER_VERSION|${VER}|g" website/index.html
          sed -i "s|PLACEHOLDER_URL|${URL}|g" website/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - id: deployment
        uses: actions/deploy-pages@v4
