name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hent versjon fra tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "zipname=Hotprevue-${VER}.zip" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Bygg frontend
        run: cd frontend && npm ci && npm run build:web

      - name: Last ned uv.exe
        run: |
          curl -fsSL "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip" -o uv-win.zip
          unzip uv-win.zip uv.exe
          rm uv-win.zip

      - name: Sett sammen distribusjon
        run: |
          DIST="hotprevue-dist"
          mkdir -p "$DIST"

          rsync -a \
            --exclude='.venv' \
            --exclude='.venv-win' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='Dockerfile' \
            --exclude='.dockerignore' \
            backend/ "$DIST/backend/"

          mkdir -p "$DIST/frontend"
          cp -r frontend/dist/. "$DIST/frontend/"

          cp Hotprevue.bat "$DIST/"
          cp hotprevue-admin.bat "$DIST/"
          cp install.bat "$DIST/"
          cp -r admin/ "$DIST/admin/"
          cp uv.exe "$DIST/"

      - name: Pakk zip
        run: |
          cd hotprevue-dist
          zip -r "../${{ steps.ver.outputs.zipname }}" .

      - name: Opprett GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Hotprevue ${{ steps.ver.outputs.version }}
          files: ${{ steps.ver.outputs.zipname }}
          generate_release_notes: true
