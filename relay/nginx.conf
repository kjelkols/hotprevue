# Nginx config snippet for Hotprevue public share relay.
# Include in your server block or use as a standalone vhost.
#
# Serving model:
#   - nginx serves /var/www/share/{token}.jpg directly as static files
#   - /push/* is proxied to the FastAPI relay on :8010 (write operations only)
#   - /health is proxied for monitoring
#
# Replace sharing.eksempel.no with your actual domain.

server {
    listen 443 ssl;
    http2 on;
    server_name sharing.eksempel.no;

    ssl_certificate     /etc/letsencrypt/live/sharing.eksempel.no/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sharing.eksempel.no/privkey.pem;

    # Static files served directly by nginx
    root /var/www/share;

    location ~ ^/[a-f0-9]+\.jpg$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # API endpoints (write operations)
    location /push/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 25m;
    }

    location /health {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
    }

    # Block everything else
    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name sharing.eksempel.no;
    return 301 https://$host$request_uri;
}
